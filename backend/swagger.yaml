openapi: 3.0.3
info:
  title: Karijera.rs API
  description: >
    REST API za platformu za oglašavanje i prijavu na poslove. Omogućava registraciju
    i autentikaciju korisnika (tražioci posla, kompanije, administratori), upravljanje
    profilima, objavljivanje i pretragu oglasa za posao, prijavljivanje na oglase i
    administraciju sistema.
  version: "1.0.0"
servers:
  - url: http://localhost:8000/api
    description: Lokalni razvojni server

tags:
  - name: Auth
    description: Registracija, prijava i upravljanje nalogom
  - name: JobListings
    description: Oglasi za posao
  - name: JobSeeker
    description: Profil i prijave tražioca posla
  - name: Company
    description: Profil i oglasi kompanije
  - name: Applications
    description: Prijave na oglase
  - name: Admin
    description: Administracija sistema
  - name: Users
    description: Javni podaci o korisnicima

paths:

  # ===================== AUTH =====================
  /register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Registracija korisnika
      description: >
        Registruje novog korisnika kao tražioca posla (job_seeker) ili kompaniju (company).
        Email adresa se dodatno validira preko eksternog Abstract API servisa
        (format, MX record, da li je disposable). Na osnovu role kreira se i odgovarajući
        profil (JobSeeker ili Company).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              jobSeeker:
                summary: Registracija tražioca posla
                value:
                  email: "marko@example.com"
                  password: "lozinka123"
                  role: "job_seeker"
                  first_name: "Marko"
                  last_name: "Markovic"
                  phone: "0641234567"
                  location: "Beograd"
                  bio: "Junior backend developer"
                  education: "fakultet"
                  github_url: "https://github.com/marko"
              company:
                summary: Registracija kompanije
                value:
                  email: "hr@firma.rs"
                  password: "lozinka123"
                  role: "company"
                  company_name: "Firma DOO"
                  website: "https://firma.rs"
                  location: "Novi Sad"
                  company_size: "50-100"
                  description: "IT kompanija"
      responses:
        '201':
          description: Korisnik uspešno registrovan, vraća se i pristupni token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validacija nije prošla (neispravni podaci ili nevalidna email adresa).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Prijava korisnika
      description: >
        Prijavljuje korisnika na osnovu email-a i lozinke i vraća Sanctum
        pristupni token koji se koristi za pristup zaštićenim rutama.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "marko@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "lozinka123"
      responses:
        '200':
          description: Uspešna prijava.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Pogrešan email ili lozinka.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Odjava korisnika
      description: Briše trenutni pristupni token korisnika (Sanctum) i odjavljuje ga sa sistema.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Uspešna odjava.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Nije autentifikovan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /change-password:
    post:
      tags: [Auth]
      operationId: changePassword
      summary: Izmena lozinke
      description: Menja lozinku ulogovanog korisnika nakon provere trenutne lozinke.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                  example: "staraLozinka123"
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  example: "novaLozinka123"
      responses:
        '200':
          description: Lozinka uspešno promenjena.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Trenutna lozinka nije ispravna.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ===================== JOB LISTINGS (public) =====================
  /job-listings:
    get:
      tags: [JobListings]
      operationId: listJobListings
      summary: Lista oglasa za posao
      description: >
        Vraća paginiranu listu svih oglasa za posao, sa mogućnošću filtriranja
        po lokaciji, tipu, nivou iskustva, rasponu plate i statusu aktivnosti.
      parameters:
        - $ref: '#/components/parameters/Location'
        - $ref: '#/components/parameters/Type'
        - $ref: '#/components/parameters/ExperienceLevel'
        - $ref: '#/components/parameters/SalaryMin'
        - $ref: '#/components/parameters/SalaryMax'
        - name: is_active
          in: query
          description: Filtrira oglase prema tome da li su aktivni.
          schema:
            type: boolean
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginirana lista oglasa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobListings'
        '404':
          description: Nema pronađenih oglasa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /job-listings/search:
    get:
      tags: [JobListings]
      operationId: searchJobListings
      summary: Pretraga oglasa za posao
      description: >
        Pretražuje oglase po ključnoj reči (naslov/opis) uz dodatne filtere
        (lokacija, tip, nivo iskustva, raspon plate).
      parameters:
        - name: keyword
          in: query
          description: Ključna reč koja se traži u nazivu ili opisu oglasa.
          schema:
            type: string
            maxLength: 255
        - $ref: '#/components/parameters/Location'
        - $ref: '#/components/parameters/Type'
        - $ref: '#/components/parameters/ExperienceLevel'
        - $ref: '#/components/parameters/SalaryMin'
        - $ref: '#/components/parameters/SalaryMax'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginirana lista pronađenih oglasa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobListings'
        '404':
          description: Nema pronađenih oglasa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validacija parametara pretrage nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /job-listings/{id}:
    get:
      tags: [JobListings]
      operationId: getJobListing
      summary: Detalji oglasa za posao
      description: Vraća detalje jednog oglasa za posao, zajedno sa podacima o kompaniji.
      parameters:
        - $ref: '#/components/parameters/JobListingId'
      responses:
        '200':
          description: Detalji oglasa.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
        '404':
          description: Oglas nije pronađen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  # ===================== USERS (public) =====================
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: Lista svih korisnika
      description: Vraća listu svih registrovanih korisnika u sistemu.
      responses:
        '200':
          description: Lista korisnika.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '404':
          description: Nema podataka.

  /users/{id}:
    get:
      tags: [Users]
      operationId: getUser
      summary: Detalji korisnika
      description: Vraća podatke o korisniku na osnovu ID-a.
      parameters:
        - name: id
          in: path
          required: true
          description: ID korisnika.
          schema:
            type: integer
      responses:
        '200':
          description: Podaci o korisniku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Korisnik nije pronađen.

  # ===================== JOB SEEKER (protected) =====================
  /job-seeker/profile:
    get:
      tags: [JobSeeker]
      operationId: getJobSeekerProfile
      summary: Profil tražioca posla
      description: Vraća profil tražioca posla ulogovanog korisnika.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Profil tražioca posla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSeeker'
        '404':
          description: Profil nije pronađen.

    put:
      tags: [JobSeeker]
      operationId: updateJobSeekerProfile
      summary: Izmena profila tražioca posla
      description: Ažurira podatke profila tražioca posla ulogovanog korisnika.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: {type: string, maxLength: 255}
                last_name: {type: string, maxLength: 255}
                phone: {type: string, maxLength: 20, nullable: true}
                location: {type: string, maxLength: 255, nullable: true}
                bio: {type: string, nullable: true}
                education:
                  type: string
                  nullable: true
                  enum: [osnovna_skola, srednja_skola, visa_skola, fakultet, master, doktorske_studije]
                github_url: {type: string, format: uri, nullable: true}
      responses:
        '200':
          description: Profil uspešno ažuriran.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  job_seeker:
                    $ref: '#/components/schemas/JobSeeker'
        '404':
          description: Profil nije pronađen.
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    delete:
      tags: [JobSeeker]
      operationId: deleteJobSeekerProfile
      summary: Brisanje profila tražioca posla
      description: Briše profil tražioca posla ulogovanog korisnika.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Profil uspešno obrisan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Profil nije pronađen.

  /job-seeker/applications:
    get:
      tags: [JobSeeker]
      operationId: listJobSeekerApplications
      summary: Lista prijava tražioca posla
      description: Vraća sve prijave na oglase koje je podneo ulogovani tražilac posla.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Lista prijava.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
    post:
      tags: [JobSeeker]
      operationId: createApplication
      summary: Prijava na oglas
      description: >
        Podnosi prijavu ulogovanog tražioca posla na izabrani oglas za posao.
        Status nove prijave je automatski "pending".
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_listing_id]
              properties:
                job_listing_id:
                  type: integer
                  description: ID oglasa na koji se prijavljuje.
      responses:
        '201':
          description: Prijava uspešno kreirana.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '403':
          description: Samo tražioci posla mogu da se prijavljuju na oglase.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '409':
          description: Korisnik se već prijavio na ovaj oglas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /job-seeker/applications/{id}:
    get:
      tags: [JobSeeker]
      operationId: getApplication
      summary: Detalji prijave
      description: Vraća detalje jedne prijave, zajedno sa podacima o tražiocu posla i oglasu.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Detalji prijave.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '404':
          description: Prijava nije pronađena.
    delete:
      tags: [JobSeeker]
      operationId: deleteApplication
      summary: Povlačenje prijave
      description: Briše prijavu tražioca posla na oglas.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Prijava uspešno obrisana.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Prijava nije pronađena.

  # ===================== COMPANY (protected) =====================
  /company/profile:
    get:
      tags: [Company]
      operationId: getCompanyProfile
      summary: Profil kompanije
      description: Vraća profil kompanije ulogovanog korisnika.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Profil kompanije.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '404':
          description: Profil nije pronađen.
    put:
      tags: [Company]
      operationId: updateCompanyProfile
      summary: Izmena profila kompanije
      description: Ažurira podatke profila kompanije ulogovanog korisnika.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_name: {type: string, maxLength: 255}
                website: {type: string, format: uri, nullable: true}
                location: {type: string, maxLength: 255, nullable: true}
                company_size:
                  type: string
                  nullable: true
                  enum: ["0-50", "50-100", "100-500", "500-1000", "1000+"]
                description: {type: string, nullable: true}
      responses:
        '200':
          description: Profil uspešno ažuriran.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  company:
                    $ref: '#/components/schemas/Company'
        '404':
          description: Profil nije pronađen.
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags: [Company]
      operationId: deleteCompanyProfile
      summary: Brisanje profila kompanije
      description: Briše profil kompanije ulogovanog korisnika.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Profil uspešno obrisan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Profil nije pronađen.

  /company/job-listings:
    post:
      tags: [Company]
      operationId: createJobListing
      summary: Kreiranje oglasa za posao
      description: Kreira novi oglas za posao u ime kompanije ulogovanog korisnika.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobListingRequest'
      responses:
        '201':
          description: Oglas uspešno kreiran.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  job_listing:
                    $ref: '#/components/schemas/JobListing'
        '403':
          description: Samo kompanije mogu kreirati oglase.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /company/job-listings/{id}:
    put:
      tags: [Company]
      operationId: updateJobListing
      summary: Izmena oglasa za posao
      description: Ažurira oglas za posao koji pripada kompaniji ulogovanog korisnika.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/JobListingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobListingRequest'
      responses:
        '200':
          description: Oglas uspešno ažuriran.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  job_listing:
                    $ref: '#/components/schemas/JobListing'
        '403':
          description: Samo kompanije mogu izmeniti oglase.
        '404':
          description: Oglas nije pronađen.
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags: [Company]
      operationId: deleteJobListing
      summary: Brisanje oglasa za posao
      description: Briše oglas za posao koji pripada kompaniji ulogovanog korisnika.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/JobListingId'
      responses:
        '200':
          description: Oglas uspešno obrisan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Samo kompanije mogu obrisati oglase.
        '404':
          description: Oglas nije pronađen.

  /company/job-listings/{id}/applications:
    get:
      tags: [Company]
      operationId: listJobListingApplications
      summary: Prijave na oglas kompanije
      description: Vraća sve prijave podnete na oglase kompanije ulogovanog korisnika.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/JobListingId'
      responses:
        '200':
          description: Lista prijava.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
        '404':
          description: Nema pristupa / korisnik nije pronađen.

  /company/applications/{id}:
    put:
      tags: [Company]
      operationId: updateApplicationStatus
      summary: Izmena statusa prijave
      description: Menja status prijave (accepted, pending, denied) na oglas kompanije.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [accepted, pending, denied]
      responses:
        '200':
          description: Status prijave uspešno ažuriran.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '404':
          description: Prijava nije pronađena.
        '422':
          description: Validacija nije prošla.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ===================== ADMIN (protected) =====================
  /admin/users:
    get:
      tags: [Admin]
      operationId: adminListUsers
      summary: Lista svih korisnika (admin)
      description: Vraća listu svih korisnika u sistemu. Dostupno samo korisnicima sa rolom "admin".
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Lista korisnika.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          description: Nemate pristup (korisnik nije admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /admin/users/{id}:
    delete:
      tags: [Admin]
      operationId: adminDeleteUser
      summary: Brisanje korisnika (admin)
      description: Briše korisnika iz sistema. Dostupno samo administratorima.
      security: [{bearerAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          description: ID korisnika koji se briše.
          schema:
            type: integer
      responses:
        '200':
          description: Korisnik uspešno obrisan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Nemate pristup (korisnik nije admin).
        '404':
          description: Korisnik nije pronađen.

  /admin/job-listings:
    get:
      tags: [Admin]
      operationId: adminListJobListings
      summary: Lista svih oglasa (admin)
      description: Vraća sve oglase za posao zajedno sa podacima o kompaniji. Dostupno samo administratorima.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Lista oglasa.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobListing'
        '403':
          description: Nemate pristup (korisnik nije admin).

  /admin/job-listings/{id}:
    delete:
      tags: [Admin]
      operationId: adminDeleteJobListing
      summary: Brisanje oglasa (admin)
      description: Briše oglas za posao iz sistema. Dostupno samo administratorima.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/JobListingId'
      responses:
        '200':
          description: Oglas uspešno obrisan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Nemate pristup (korisnik nije admin).
        '404':
          description: Oglas nije pronađen.

  /admin/applications:
    get:
      tags: [Admin]
      operationId: adminListApplications
      summary: Lista svih prijava (admin)
      description: Vraća sve prijave na oglase zajedno sa podacima o tražiocu posla i oglasu. Dostupno samo administratorima.
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Lista prijava.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
        '403':
          description: Nemate pristup (korisnik nije admin).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: >
        Pristupni token dobijen prilikom registracije ili prijave. Šalje se u
        zaglavlju "Authorization: Bearer {token}" za sve zaštićene rute.

  parameters:
    JobListingId:
      name: id
      in: path
      required: true
      description: ID oglasa za posao.
      schema:
        type: integer
    ApplicationId:
      name: id
      in: path
      required: true
      description: ID prijave na oglas.
      schema:
        type: integer
    Location:
      name: location
      in: query
      description: Filtrira po lokaciji (delimično poklapanje).
      schema:
        type: string
        maxLength: 255
    Type:
      name: type
      in: query
      description: Tip oglasa.
      schema:
        type: string
        enum: [posao, praksa]
    ExperienceLevel:
      name: experience_level
      in: query
      description: Nivo potrebnog iskustva.
      schema:
        type: string
        enum: [intern, junior, medior, senior]
    SalaryMin:
      name: salary_min
      in: query
      description: Minimalna plata.
      schema:
        type: integer
        minimum: 0
    SalaryMax:
      name: salary_max
      in: query
      description: Maksimalna plata.
      schema:
        type: integer
        minimum: 0
    PerPage:
      name: per_page
      in: query
      description: Broj rezultata po stranici (paginacija). Podrazumevano 10.
      schema:
        type: integer
        default: 10

  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Validation failed."
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email: {type: string, format: email, maxLength: 255}
        password: {type: string, format: password, minLength: 8}
        role: {type: string, enum: [job_seeker, company]}
        first_name: {type: string, maxLength: 255, description: "Obavezno ako je role=job_seeker"}
        last_name: {type: string, maxLength: 255, description: "Obavezno ako je role=job_seeker"}
        phone: {type: string, maxLength: 20, nullable: true}
        location: {type: string, maxLength: 255, nullable: true}
        bio: {type: string, nullable: true}
        education: {type: string, maxLength: 255, nullable: true}
        github_url: {type: string, format: uri, nullable: true}
        company_name: {type: string, maxLength: 255, description: "Obavezno ako je role=company"}
        website: {type: string, format: uri, nullable: true}
        company_size: {type: string, maxLength: 50, nullable: true}
        description: {type: string, nullable: true}

    AuthResponse:
      type: object
      properties:
        message: {type: string}
        data:
          $ref: '#/components/schemas/User'
        access_token: {type: string}
        token_type: {type: string, example: "Bearer"}

    User:
      type: object
      properties:
        id: {type: integer}
        email: {type: string, format: email}
        role: {type: string, enum: [job_seeker, company, admin]}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    JobSeeker:
      type: object
      properties:
        id: {type: integer}
        user_id: {type: integer}
        first_name: {type: string}
        last_name: {type: string}
        phone: {type: string, nullable: true}
        location: {type: string, nullable: true}
        bio: {type: string, nullable: true}
        education:
          type: string
          nullable: true
          enum: [osnovna_skola, srednja_skola, visa_skola, fakultet, master, doktorske_studije]
        github_url: {type: string, format: uri, nullable: true}

    Company:
      type: object
      properties:
        id: {type: integer}
        user_id: {type: integer}
        company_name: {type: string}
        website: {type: string, format: uri, nullable: true}
        location: {type: string, nullable: true}
        company_size:
          type: string
          nullable: true
          enum: ["0-50", "50-100", "100-500", "500-1000", "1000+"]
        description: {type: string, nullable: true}

    JobListingRequest:
      type: object
      required: [title, type, description]
      properties:
        title: {type: string, maxLength: 255}
        location: {type: string, maxLength: 255, nullable: true}
        type: {type: string, enum: [posao, praksa]}
        experience_level:
          type: string
          nullable: true
          enum: [intern, junior, medior, senior]
        salary_min: {type: number, nullable: true, minimum: 0}
        salary_max: {type: number, nullable: true, minimum: 0, description: "Mora biti >= salary_min"}
        is_active: {type: boolean, default: true}
        description: {type: string}
        expires_at: {type: string, format: date, nullable: true, description: "Mora biti datum u budućnosti"}

    JobListing:
      type: object
      properties:
        id: {type: integer}
        company_id: {type: integer}
        title: {type: string}
        description: {type: string}
        location: {type: string, nullable: true}
        type: {type: string, enum: [posao, praksa]}
        experience_level:
          type: string
          nullable: true
          enum: [intern, junior, medior, senior]
        salary_min: {type: number, nullable: true}
        salary_max: {type: number, nullable: true}
        is_active: {type: boolean}
        expires_at: {type: string, format: date, nullable: true}
        company:
          $ref: '#/components/schemas/Company'

    PaginatedJobListings:
      type: object
      properties:
        current_page: {type: integer}
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobListing'
        per_page: {type: integer}
        total: {type: integer}
        last_page: {type: integer}

    Application:
      type: object
      properties:
        id: {type: integer}
        job_seeker_id: {type: integer}
        job_listing_id: {type: integer}
        status: {type: string, enum: [pending, accepted, denied]}
        applied_at: {type: string, format: date-time}
        job_seeker:
          $ref: '#/components/schemas/JobSeeker'
        job_listing:
          $ref: '#/components/schemas/JobListing'
